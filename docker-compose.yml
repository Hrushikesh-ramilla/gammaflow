version: "3.8"

services:
  node-1:
    build: .
    container_name: raftkv-node-1
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - node1-data:/home/raftkv/data
    command: >
      --node-id=node-1
      --http-addr=:8080
      --grpc-addr=:9090
      --peers=node-2,node-3,node-4,node-5
      --peer-grpc-addrs=node-2=node-2:9090,node-3=node-3:9090,node-4=node-4:9090,node-5=node-5:9090
      --peer-http-addrs=node-1=node-1:8080,node-2=node-2:8080,node-3=node-3:8080,node-4=node-4:8080,node-5=node-5:8080
      --data-dir=/home/raftkv/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - raft-net
    restart: unless-stopped

  node-2:
