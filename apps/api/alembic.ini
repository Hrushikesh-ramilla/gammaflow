[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

# Default db url for local dev (overridden by env.py)
sqlalchemy.url = postgresql+asyncpg://syl:sylpass@localhost:5432/syldb

[post_write_hooks]
# post_write_hooks = format
# format.type = console
# format.executable = ruff
# format.options = format

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
